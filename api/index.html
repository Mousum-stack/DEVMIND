<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevMind</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui;background:#f5f5f5;height:100vh;display:flex;}
.sidebar{width:260px;background:white;border-right:1px solid #eee;display:flex;flex-direction:column;transition:width 0.2s;overflow:hidden;flex-shrink:0;}
.sidebar.closed{width:0;border:none;}
.sb-head{padding:12px;border-bottom:1px solid #eee;display:flex;flex-direction:column;gap:8px;}
.sb-top{display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-size:13px;font-weight:600;color:#333;white-space:nowrap;}
.new-chat-btn{width:100%;padding:8px;background:#667eea;color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.new-chat-btn:hover{background:#5a6fd6;}
.sb-list{flex:1;overflow-y:auto;padding:8px;}
.sb-section{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:6px 4px 4px;}
.h-item{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.h-item:hover{background:#f9f9f9;border-color:#eee;}
.h-item.active{background:#f0f0ff;border-color:#ddd;}
.h-q{font-size:12px;font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-t{font-size:10px;color:#aaa;margin-top:2px;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{padding:10px 16px;background:white;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tog{width:28px;height:28px;border:1px solid #ddd;border-radius:6px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tog:hover{background:#f5f5f5;}
.tog-icon{display:flex;flex-direction:column;gap:3px;}
.tog-icon span{display:block;width:14px;height:1.5px;background:#666;border-radius:1px;}
.brand{font-size:15px;font-weight:700;color:#333;}
.brand span{color:#667eea;}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;}
.online{font-size:11px;color:#22c55e;}
.project-select{padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;color:#333;background:white;cursor:pointer;max-width:140px;}
.add-btn{padding:5px 12px;background:#667eea;color:white;border:none;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;margin-left:auto;}
.add-btn:hover{background:#5a6fd6;}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#999;}
.empty-title{font-size:16px;font-weight:600;color:#333;}
.empty-sub{font-size:13px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:6px;}
.chip{font-size:12px;padding:5px 12px;border:1px solid #ddd;border-radius:20px;cursor:pointer;color:#555;background:white;}
.chip:hover{border-color:#667eea;color:#667eea;}
.msg-user{display:flex;justify-content:flex-end;}
.u-bubble{background:#667eea;color:white;padding:10px 14px;border-radius:12px;border-bottom-right-radius:3px;font-size:13px;max-width:75%;line-height:1.5;}
.msg-ai{display:flex;gap:8px;align-items:flex-start;}
.avatar{width:28px;height:28px;border-radius:50%;background:#eef;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#667eea;flex-shrink:0;margin-top:2px;}
.ai-body{flex:1;min-width:0;}
.a-bubble{background:white;padding:10px 14px;border-radius:12px;border-bottom-left-radius:3px;font-size:13px;line-height:1.6;color:#333;border:1px solid #eee;}
.a-bubble h1,.a-bubble h2,.a-bubble h3{font-size:14px;font-weight:600;margin:8px 0 4px;color:#333;}
.a-bubble ul,.a-bubble ol{padding-left:18px;margin:6px 0;}
.a-bubble li{margin-bottom:4px;}
.a-bubble code{background:#f5f5f5;padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace;}
.a-bubble pre{background:#1e2530;padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;}
.a-bubble pre code{background:transparent;color:#e2e8f0;font-size:12px;}
.a-bubble p{margin-bottom:6px;}
.a-bubble strong{font-weight:600;}
.metrics{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.pill{font-size:11px;padding:3px 8px;border-radius:20px;background:#f5f5f5;border:1px solid #eee;color:#666;}
.sources{margin-top:6px;font-size:11px;color:#999;}
.stag{display:inline-block;background:#f0f0ff;border:1px solid #ddd;border-radius:4px;padding:1px 6px;margin:2px 2px 0 0;font-size:10px;color:#667eea;}
.thinking{display:flex;gap:4px;align-items:center;padding:10px 14px;background:white;border-radius:12px;border:1px solid #eee;width:fit-content;}
.td{width:6px;height:6px;border-radius:50%;background:#ccc;animation:b 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s;}
.td:nth-child(3){animation-delay:.4s;}
@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.input-area{padding:12px 16px;background:white;border-top:1px solid #eee;}
.irow{display:flex;gap:8px;}
.qi{flex:1;padding:10px 14px;border:1.5px solid #eee;border-radius:10px;font-size:13px;outline:none;}
.qi:focus{border-color:#667eea;}
.ask{padding:10px 18px;background:#667eea;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;}
.ask:hover{background:#5a6fd6;}
.modal-bg{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:white;border-radius:12px;padding:24px;width:420px;max-width:90%;}
.modal h3{font-size:15px;font-weight:600;color:#333;margin-bottom:16px;}
.modal input{width:100%;padding:10px 12px;border:1.5px solid #eee;border-radius:8px;font-size:13px;margin-bottom:10px;outline:none;}
.modal input:focus{border-color:#667eea;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
.modal-cancel{padding:8px 16px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:white;}
.modal-add{padding:8px 16px;background:#667eea;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;}
.status-msg{font-size:12px;color:#667eea;margin-top:6px;min-height:18px;}
</style>
</head>
<body>
<div style="position:relative;display:flex;width:100%;height:100vh;">

<div class="sidebar" id="sb">
  <div class="sb-head">
    <div class="sb-top">
      <span class="sb-title">DevMind</span>
      <button class="tog" onclick="toggle()">
        <div class="tog-icon"><span></span><span></span><span></span></div>
      </button>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  </div>
  <div class="sb-list" id="hist">
    <div class="sb-section">Recent chats</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <button class="tog" id="showbtn" onclick="toggle()" style="display:none">
      <div class="tog-icon"><span></span><span></span><span></span></div>
    </button>
    <span class="brand">Dev<span>Mind</span></span>
    <div class="dot"></div>
    <span class="online" id="chatLabel">New chat</span>
    <select class="project-select" id="projectSelect" onchange="onProjectChange()">
      <option value="">Loading...</option>
    </select>
    <button class="add-btn" onclick="openModal()">+ Add codebase</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="irow">
      <input class="qi" id="qi" placeholder="Ask a question about the codebase..." onkeydown="if(event.key==='Enter')ask()"/>
      <button class="ask" id="askbtn" onclick="ask()">Ask</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Add a new codebase</h3>
    <input id="repoUrl" placeholder="GitHub URL e.g. https://github.com/django/django"/>
    <input id="repoName" placeholder="Project name e.g. django"/>
    <div class="status-msg" id="statusMsg"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-add" onclick="addCodebase()">Add + Index</button>
    </div>
  </div>
</div>

</div>
<script>
let sidebarOpen=true;
let currentProject='';
let pollInterval=null;
let sessions={};
let currentSessionId=null;
let sessionCounter=0;

function genId(){return 'session_'+(++sessionCounter)+'_'+Date.now();}

function newChat(){
  const id=genId();
  sessions[id]={id,title:'New chat',messages:[],time:new Date()};
  currentSessionId=id;
  renderChat();
  document.getElementById('chatLabel').textContent='New chat';
  document.getElementById('qi').focus();
  refreshHistory();
}

function renderChat(){
  const chat=document.getElementById('chat');
  chat.innerHTML='';
  if(!currentSessionId||!sessions[currentSessionId]||sessions[currentSessionId].messages.length===0){
    chat.innerHTML=`
      <div class="empty" id="empty">
        <div class="empty-title">Ask your codebase anything</div>
        <div class="empty-sub">Select a project and start asking</div>
        <div class="chips">
          <div class="chip" onclick="fill('How does dependency injection work?')">Dependency injection</div>
          <div class="chip" onclick="fill('What is the routing system?')">Routing</div>
          <div class="chip" onclick="fill('How does request validation work?')">Request validation</div>
          <div class="chip" onclick="fill('How do you add middleware?')">Middleware</div>
        </div>
      </div>`;
    return;
  }
  sessions[currentSessionId].messages.forEach(msg=>{
    if(msg.type==='user'){
      const d=document.createElement('div');
      d.className='msg-user';
      d.innerHTML=`<div class="u-bubble">${msg.text}</div>`;
      chat.appendChild(d);
    } else {
      const d=document.createElement('div');
      d.className='msg-ai';
      let m='',s='';
      if(msg.metrics && msg.metrics.total_time > 0){
        m=`<div class="metrics">
          <span class="pill">retrieval ${msg.metrics.retrieval_time}s</span>
          <span class="pill">generation ${msg.metrics.generation_time}s</span>
          <span class="pill">total ${msg.metrics.total_time}s</span>
          <span class="pill">${msg.metrics.chunks_used} chunks</span>
        </div>`;
      }
      if(msg.sources && msg.sources.length && !msg.sources.includes('general_knowledge')){
        const uniqueSources=[...new Set(msg.sources.map(x=>x.split('/').pop()))];
        s=`<div class="sources">Sources: ${uniqueSources.map(x=>`<span class="stag">${x}</span>`).join('')}</div>`;
      }
      const parsedAnswer = typeof marked !== 'undefined' ? marked.parse(msg.answer) : msg.answer;
      d.innerHTML=`<div class="avatar">DM</div><div class="ai-body"><div class="a-bubble">${parsedAnswer}</div>${m}${s}</div>`;
      chat.appendChild(d);
    }
  });
  chat.scrollTop=chat.scrollHeight;
}

function refreshHistory(){
  const hist=document.getElementById('hist');
  hist.innerHTML='<div class="sb-section">Recent chats</div>';
  Object.values(sessions).reverse().forEach(s=>{
    const d=document.createElement('div');
    d.className='h-item'+(s.id===currentSessionId?' active':'');
    d.onclick=()=>loadSession(s.id);
    const t=s.time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    d.innerHTML=`<div class="h-q">${s.title}</div><div class="h-t">${currentProject||'devmind'} • ${t}</div>`;
    hist.appendChild(d);
  });
}

function loadSession(id){
  currentSessionId=id;
  document.getElementById('chatLabel').textContent=sessions[id].title;
  renderChat();
  refreshHistory();
}

async function loadProjects(){
  try{
    const res=await fetch('/projects');
    const d=await res.json();
    const sel=document.getElementById('projectSelect');
    sel.innerHTML='';
    if(d.projects.length===0){sel.innerHTML='<option value="">No projects yet</option>';return;}
    d.projects.forEach(p=>{
      const o=document.createElement('option');
      o.value=p.name;
      o.textContent=p.name+(p.status!=='ready'?' ('+p.status+')':'');
      sel.appendChild(o);
    });
    if(!currentProject&&d.projects.length>0){
      currentProject=d.projects[0].name;
      sel.value=currentProject;
    }
  }catch(e){console.error(e);}
}

function onProjectChange(){currentProject=document.getElementById('projectSelect').value;}

function toggle(){
  sidebarOpen=!sidebarOpen;
  document.getElementById('sb').classList.toggle('closed',!sidebarOpen);
  document.getElementById('showbtn').style.display=sidebarOpen?'none':'flex';
}

function fill(t){document.getElementById('qi').value=t;document.getElementById('qi').focus();}

function openModal(){
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('statusMsg').textContent='';
  document.getElementById('repoUrl').value='';
  document.getElementById('repoName').value='';
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
  if(pollInterval){clearInterval(pollInterval);pollInterval=null;}
}

async function addCodebase(){
  const url=document.getElementById('repoUrl').value.trim();
  const name=document.getElementById('repoName').value.trim().toLowerCase().replace(/\s+/g,'_');
  if(!url||!name){document.getElementById('statusMsg').textContent='Please fill both fields.';return;}
  document.getElementById('statusMsg').textContent='Starting...';
  try{
    const res=await fetch('/add-codebase',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({github_url:url,project_name:name})});
    const d=await res.json();
    document.getElementById('statusMsg').textContent=d.message;
    pollInterval=setInterval(async()=>{
      const s=await fetch(`/status/${name}`);
      const sd=await s.json();
      document.getElementById('statusMsg').textContent=`Status: ${sd.status}`;
      if(sd.status==='ready'){
        clearInterval(pollInterval);pollInterval=null;
        await loadProjects();
        currentProject=name;
        document.getElementById('projectSelect').value=name;
        closeModal();
      } else if(sd.status.startsWith('error')){
        clearInterval(pollInterval);pollInterval=null;
      }
    },3000);
  }catch(e){document.getElementById('statusMsg').textContent='Error: '+e.message;}
}

async function ask(){
  const qi=document.getElementById('qi');
  const q=qi.value.trim();
  if(!q)return;
  if(!currentSessionId)newChat();
  qi.value='';
  document.getElementById('askbtn').textContent='...';
  document.getElementById('empty')?.remove();

  sessions[currentSessionId].messages.push({type:'user',text:q});
  if(sessions[currentSessionId].title==='New chat')sessions[currentSessionId].title=q.slice(0,40);
  document.getElementById('chatLabel').textContent=sessions[currentSessionId].title;
  renderChat();
  addThinking();

  try{
    const res=await fetch('/query',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q,project:currentProject||'chroma'})
    });
    const d=await res.json();
    removeThinking();
    sessions[currentSessionId].messages.push({
      type:'ai',
      answer:d.answer,
      metrics:d.metrics,
      sources:d.sources
    });
    renderChat();
    refreshHistory();
  }catch(e){
    removeThinking();
    sessions[currentSessionId].messages.push({type:'ai',answer:'Error connecting to backend.',metrics:null,sources:[]});
    renderChat();
  }
  document.getElementById('askbtn').textContent='Ask';
}

function addThinking(){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='msg-ai';d.id='thinking';
  d.innerHTML=`<div class="avatar">DM</div><div class="ai-body"><div class="thinking"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}

function removeThinking(){document.getElementById('thinking')?.remove();}

newChat();
loadProjects();
</script>
</body>
</html>
