<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ Markdown parser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevMind</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui;background:#f5f5f5;height:100vh;display:flex;}

.sidebar{width:260px;background:white;border-right:1px solid #eee;display:flex;flex-direction:column;transition:width 0.2s;overflow:hidden;flex-shrink:0;}
.sidebar.closed{width:0;border:none;}

.sb-head{padding:14px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-size:13px;font-weight:600;color:#333;}

.sb-list{flex:1;overflow-y:auto;padding:8px;}

.h-item{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;}
.h-item:hover{background:#f9f9f9;border-color:#eee;}
.h-item.active{background:#f0f0ff;border-color:#ddd;}

.main{flex:1;display:flex;flex-direction:column;}
.topbar{padding:12px 16px;background:white;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;}

.brand{font-size:15px;font-weight:700;color:#333;}
.brand span{color:#667eea;}

.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}

.msg-user{display:flex;justify-content:flex-end;}
.u-bubble{background:#667eea;color:white;padding:10px 14px;border-radius:12px;border-bottom-right-radius:3px;font-size:13px;max-width:75%;}

.msg-ai{display:flex;gap:8px;align-items:flex-start;}
.avatar{width:28px;height:28px;border-radius:50%;background:#eef;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#667eea;}

.ai-body{flex:1;}
.a-bubble{
  background:white;
  padding:10px 14px;
  border-radius:12px;
  border-bottom-left-radius:3px;
  font-size:13px;
  line-height:1.6;
  border:1px solid #eee;
}

/* ✅ Markdown styling */
.a-bubble pre {
  background:#1e1e1e;
  color:#eee;
  padding:10px;
  border-radius:8px;
  overflow-x:auto;
  font-size:12px;
}
.a-bubble code {
  background:#f0f0f0;
  padding:2px 4px;
  border-radius:4px;
  font-size:12px;
}
.a-bubble ul { padding-left:18px; }
.a-bubble li { margin-bottom:4px; }

.input-area{padding:12px 16px;background:white;border-top:1px solid #eee;}
.irow{display:flex;gap:8px;}

.qi{flex:1;padding:10px;border-radius:10px;border:1px solid #eee;}
.ask{padding:10px 18px;background:#667eea;color:white;border:none;border-radius:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="main">

  <div class="topbar">
    <span class="brand">Dev<span>Mind</span></span>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="irow">
      <input class="qi" id="qi" placeholder="Ask something..." onkeydown="if(event.key==='Enter')ask()"/>
      <button class="ask" onclick="ask()">Ask</button>
    </div>
  </div>

</div>

<script>

async function ask(){
  const qi=document.getElementById('qi');
  const q=qi.value.trim();
  if(!q)return;

  qi.value='';
  addUser(q);

  const res=await fetch('/query',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({question:q})
  });

  const d=await res.json();
  addAI(d.answer);
}

function addUser(t){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='msg-user';
  d.innerHTML=`<div class="u-bubble">${t}</div>`;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

function addAI(ans){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='msg-ai';

  d.innerHTML=`
    <div class="avatar">DM</div>
    <div class="ai-body">
      <div class="a-bubble">
        ${typeof marked !== 'undefined' ? marked.parse(ans) : ans}
      </div>
    </div>
  `;

  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

</script>

</body>
</html>
