name: DevMind Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ragas Evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python rag/evaluate.py

      - name: Check Faithfulness Score
        run: |
          python << 'PYTHON_EOF'
          import json
          with open('./data/eval_results.json', 'r') as f:
              results = json.load(f)
          faithfulness = results.get('faithfulness_score', 0)
          if faithfulness >= 0.80:
              print(f"✅ PASS: {faithfulness:.3f}")
              exit(0)
          else:
              print(f"❌ FAIL: {faithfulness:.3f} < 0.80")
              exit(1)
          PYTHON_EOF
